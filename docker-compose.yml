# =============================================================================
# AnythingMCP — Full Stack Deployment (Single Container)
# =============================================================================
# Usage:  docker compose up -d
# UI:     http://localhost:3000
# API:    http://localhost:4000
# MCP:    http://localhost:4000/mcp
# =============================================================================

name: atmcp

services:

  # NestJS Backend + Next.js Frontend (single container)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atmcp-app
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - DATABASE_URL=postgresql://atmcp:${POSTGRES_PASSWORD:-atmcp}@postgres:5432/anythingmcp
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-32-chars}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-in-production-exactly-32}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - SERVER_URL=${SERVER_URL:-http://localhost:4000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # MCP Authentication (oauth2 | legacy | both | none)
      - MCP_AUTH_MODE=${MCP_AUTH_MODE:-legacy}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN:-}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: atmcp-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=atmcp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-atmcp}
      - POSTGRES_DB=anythingmcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atmcp -d anythingmcp"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: atmcp-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
